name: Build APK

on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk pdftoaudio.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdftoaudio-debug-apk
          path: pdftoaudio.apk
          retention-days: 30

      - name: Publish to GitHub Releases (latest-build)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest-build --yes 2>/dev/null || true
          gh release create latest-build pdftoaudio.apk \
            --title "Latest Build" \
            --notes "Auto-built debug APK. Download and open on your Android phone to install. You may need to allow 'Install unknown apps' from your browser in Android settings." \
            --prerelease
